networks:
  coolify:
    external: true

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3333
      - APP_KEY=${APP_KEY}
      - SESSION_DRIVER=cookie
      # Banco agora no Supabase (serviço Coolify ldnnyd5fd64huxqtewhsybwo),
      # acessível pelo nome do container na rede compartilhada "coolify".
      - DB_HOST=${DB_HOST:-supabase-db-ldnnyd5fd64huxqtewhsybwo}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE:-camara_sume}
      - TZ=America/Sao_Paulo
      - LOG_LEVEL=info
    # Porta publicada no host parametrizável por câmara (multi-app no mesmo servidor):
    # Sumé usa 3333 (default, intocado); cada câmara nova define APP_HOST_PORT único
    # (ex.: Junco 3334) para não conflitar. O roteamento real é por DOMÍNIO via
    # Traefik (coolify-proxy) na rede "coolify" — esta publicação no host é redundante.
    ports:
      - "${APP_HOST_PORT:-3333}:3333"
    volumes:
      - uploads:/app/public/uploads
    networks:
      - default
      - coolify
    restart: unless-stopped
    # Coolify usa este healthcheck para gatear o rolling: só direciona tráfego ao
    # container novo quando ele responde 200 em /health (servidor realmente escutando)
    # e marca o antigo para parada só depois. Espelha o do Dockerfile e deixa o gate
    # explícito no compose. /health é barato e não toca o banco (interceptado no
    # firewall middleware), então não dá falso-negativo em boot frio.
    healthcheck:
      test:
        ['CMD', 'node', '-e', "fetch('http://localhost:3333/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 900s
    # Shutdown gracioso: ao trocar de container, o Docker manda SIGTERM e espera
    # ESTE tempo antes do SIGKILL. Precisa ser MAIOR que a janela de DRAIN
    # (SHUTDOWN_DRAIN_MS, default 6s em bin/server.ts) + o teto de uma requisição
    # em voo (query_timeout=25s em config/database.ts) ⇒ ~31s. 45s dá margem para
    # o app.terminate() fechar o servidor HTTP e o pool do Postgres sem SIGKILL.
    stop_grace_period: 45s

volumes:
  uploads:
