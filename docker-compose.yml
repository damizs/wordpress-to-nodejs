networks:
  coolify:
    external: true

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3333
      - APP_KEY=${APP_KEY}
      - SESSION_DRIVER=cookie
      # Banco agora no Supabase (serviço Coolify ldnnyd5fd64huxqtewhsybwo),
      # acessível pelo nome do container na rede compartilhada "coolify".
      - DB_HOST=${DB_HOST:-supabase-db-ldnnyd5fd64huxqtewhsybwo}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE:-camara_sume}
      - TZ=America/Sao_Paulo
      - LOG_LEVEL=info
    ports:
      - "3333:3333"
    volumes:
      - uploads:/app/public/uploads
    networks:
      - default
      - coolify
    restart: unless-stopped

volumes:
  uploads:
